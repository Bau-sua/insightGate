financial_scrape_task:
  description: >
    Use AlphaVantageTool to fetch INCOME_STATEMENT, BALANCE_SHEET, CASH_FLOW for {ticker} last 4 quarters.
    Focus: totalRevenue, researchAndDevelopment, netIncome, totalDebt.
  expected_output: >
    Structured JSON: {{"quarters": [{{q1: {{revenue:.., r_and_d:.., net_income:.., debt:..}}, ...}], "overview": marketCap, peRatio, profitMargin}}
  agent: financial_data_scraper


sentiment_gather_task:
  description: >
    Search recent (6 months) news/earnings for {ticker}: CEO quotes on growth, innovation, efficiency.
  expected_output: >
    Bullet list: - "Quote1" source/link - "Claim2 on X" sentiment (positive/negative)
  agent: market_sentiment_analyst
  context: [financial_scrape_task]


audit_task:
  description: >
    Analyze financial JSON vs narrative quotes. Flag disonancias: Innovation (R&D flat?), Growth (revenue stagnant?), Efficiency (opex up?).
  expected_output: >
    Flags: ## CRITICAL: [desc] ## WARNING: [evidence] ## OK: [backed]
  agent: dissonance_auditor
  context: [financial_scrape_task, sentiment_gather_task]

report_task:
  description: >
    Generate full MD report from data/flags.
  expected_output: >
    Markdown: # {ticker} Audit | Confidence: XX% | Flags table | Details
  agent: reporting_officer
  context: [financial_scrape_task, sentiment_gather_task, audit_task]
  output_file: outputs/audit.md
  markdown: true
