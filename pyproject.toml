[project]
name = "insigthgape"
version = "0.1.0"
description = "insigthGape using crewAI"
authors = [{ name = "Your Name", email = "you@example.com" }]
requires-python = ">=3.10,<3.14"
dependencies = [
    "crewai[tools]==1.14.1"
]

[project.scripts]
insigthgape = "insigthgape.main:run"
run_crew = "insigthgape.main:run"
train = "insigthgape.main:train"
replay = "insigthgape.main:replay"
test = "insigthgape.main:test"
run_with_trigger = "insigthgape.main:run_with_trigger"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.crewai]
type = "crew"
